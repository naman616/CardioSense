# Data configuration for CardioSense

dataset:
  primary: mit_bih
  secondary: ptbdb

paths:
  mitbih_train: data/raw/mitbih_train.csv
  mitbih_test:  data/raw/mitbih_test.csv
  ptbdb_normal:   data/raw/ptbdb_normal.csv
  ptbdb_abnormal: data/raw/ptbdb_abnormal.csv
  processed_dir:  data/processed/

mit_bih:
  signal_length: 187       # ECG signal values per sample
  num_classes: 5
  total_samples: 109446
  train_samples: 87554
  test_samples: 21892
  class_names: ["Normal", "Supraventricular", "Ventricular", "Fusion", "Unknown"]
  class_frequencies:        # approximate proportions in raw training data
    0: 0.830                # Normal Beat (N)
    1: 0.030                # Supraventricular Ectopic (S)
    2: 0.060                # Ventricular Ectopic (V)
    3: 0.007                # Fusion Beat (F) — rarest class
    4: 0.073                # Unknown/Unclassifiable (Q)

ptbdb:
  signal_length: 187
  num_classes: 2
  total_samples: 14552
  class_names: ["Healthy", "Myocardial Infarction"]

preprocessing:
  val_fraction: 0.15        # 15% of train set held as validation
  random_seed: 42
  normalize: zscore         # per-sample Z-score normalization
  outlier_method: iqr       # IQR-based outlier removal
  smote_on_train_only: true # prevent data leakage
  tensor_shape: [187, 1]    # Conv1D input format (length, channels)
