# Training configuration for CardioSense (§8.6)

training:
  random_seed: 42
  batch_size: 128
  max_epochs: 100
  device: auto              # auto-detect CUDA > MPS > CPU

  early_stopping:
    monitor: val_macro_f1   # macro F1 (not accuracy — imbalanced classes)
    patience: 15
    min_delta: 0.0001
    restore_best_weights: true

  lr_scheduler:
    type: CosineAnnealingLR
    motivation: "Mirrors 1/√t decay proven in Adam Theorem 4.1 (§4)"
    T_max: 100              # one cosine cycle over all epochs

  loss:
    type: FocalLoss
    gamma: 2.0              # focusing parameter (Lin et al. 2017 default)
    alpha: inverse_frequency  # per-class weight = 1 / class_frequency

  regularization:
    dropout: 0.4            # applied in ResNet head Dense layer
    weight_decay: 0.0001    # L2 via optimizer weight_decay param (λ=1e-4)

checkpointing:
  save_dir: results/checkpoints
  filename_template: "{model}_{optimizer}_epoch{epoch:03d}_f1{f1:.4f}.pth"
  save_best_only: true

logging:
  metrics_per_epoch: [train_loss, val_loss, train_acc, val_acc, train_f1, val_f1, lr]
  save_dir: results/logs
