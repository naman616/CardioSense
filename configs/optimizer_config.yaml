# Optimizer comparison study configuration (§8.7)
# All optimizers trained under identical conditions (same model, data, seed).
# Each is initialized with the same weight_decay for fair comparison.

weight_decay: 0.0001    # L2 regularization — same for all optimizers

optimizers:

  sgd:
    class: torch.optim.SGD
    lr: 0.01
    momentum: 0.0
    adam_paper_prediction: >
      Expected to stall on sparse minority-class gradients (Fusion: 0.7%).
      No adaptive mechanism — all parameters share one global learning rate.
      Reference: Adam §6.1 (sparse gradient experiment on IMDB BoW).

  sgd_momentum:
    class: torch.optim.SGD
    lr: 0.01
    momentum: 0.9
    adam_paper_prediction: >
      Improvement over vanilla SGD via momentum term (β1 analogue).
      Still lacks per-parameter adaptation — a rare arrhythmia class update
      affects all parameters equally regardless of gradient history.
      Reference: Adam §5 (comparison with momentum methods).

  adagrad:
    class: torch.optim.Adagrad
    lr: 0.01
    adam_paper_prediction: >
      Handles gradient sparsity via accumulated squared gradients (like Adam §2).
      However, monotonically decaying learning rates (sum grows unboundedly)
      cause learning to stall late in training — cannot adapt if gradient
      direction shifts as model learns subtler arrhythmia patterns.
      Reference: Adam §5 (AdaGrad connection, bias correction importance).

  rmsprop:
    class: torch.optim.RMSprop
    lr: 0.001
    alpha: 0.99             # β2 equivalent
    adam_paper_prediction: >
      Handles non-stationarity via exponential moving average of squared gradients.
      However, lacks bias correction term — at high α (≈β2=0.999), initialization
      bias causes very large initial steps and potential divergence.
      Reference: Adam §5, §6.4 (bias correction experiment, Figure 4).

  adam:
    class: torch.optim.Adam
    lr: 0.001               # α — paper-default (Algorithm 1)
    betas: [0.9, 0.999]     # β1, β2 — paper-default
    eps: 0.00000001         # ε=1e-8 — paper-default
    adam_paper_prediction: >
      Combines AdaGrad's sparse gradient handling with RMSProp's non-stationarity
      handling, plus bias correction missing from RMSProp.
      Expected fastest convergence and highest minority-class F1.
      Theoretical guarantee: O(√T) regret bound (Theorem 4.1, §4).
      Reference: Adam §6 (all experiments), §2 (algorithm).
